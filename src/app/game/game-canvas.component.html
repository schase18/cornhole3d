<div class="game-shell">
  <canvas #renderCanvas class="render-canvas" touch-action="none"></canvas>
  <div class="minimap-frame">
    <span class="minimap-label">Board View</span>
  </div>
  @if (gameState.state$ | async; as state) {
    <div class="hud" aria-live="polite">
      <div class="hud-row">
        <span class="label">Score</span>
        <span class="value">{{ state.totalScore }}</span>
      </div>
      <div
        class="hud-row"
        [class.hud-row--flash-in]="state.scoreboardFlashRow === 'in'">
        <span class="label">In</span>
        <span class="value">{{ state.bagsIn }}</span>
      </div>
      <div
        class="hud-row"
        [class.hud-row--flash-on]="state.scoreboardFlashRow === 'on'">
        <span class="label">On</span>
        <span class="value">{{ state.bagsOn }}</span>
      </div>
      <div
        class="hud-row"
        [class.hud-row--flash-off]="state.scoreboardFlashRow === 'off'">
        <span class="label">Off</span>
        <span class="value">{{ state.bagsOff }}</span>
      </div>
      <div class="hud-row">
        <span class="label">Bags left</span>
        <span class="value">{{ state.throwsRemaining }}</span>
      </div>
      <div class="hud-row">
        <span class="label">Round</span>
        <span class="value">{{ state.round }}</span>
      </div>
      <div class="reset-row">
        <button type="button" (click)="resetGame()">Reset</button>
      </div>
      <p class="hint">{{ state.lastMessage }}</p>
      <div class="side-toggle">
        <button
          [class.active]="gameState.bagSide === 'stick'"
          (click)="setBagSide('stick')">Stick Side</button>
        <button
          [class.active]="gameState.bagSide === 'slick'"
          (click)="setBagSide('slick')">Slick Side</button>
      </div>
      <div class="speed-row">
        <label class="speed-label" for="stickSpeed">Stick Speed</label>
        <select
          id="stickSpeed"
          class="speed-select"
          (change)="setStickSpeed($event)">
          @for (n of speedOptions; track n) {
            <option [value]="n" [selected]="gameState.stickSpeed === n">{{ n }}</option>
          }
        </select>
      </div>
      <div class="speed-row">
        <label class="speed-label" for="slickSpeed">Slick Speed</label>
        <select
          id="slickSpeed"
          class="speed-select"
          (change)="setSlickSpeed($event)">
          @for (n of speedOptions; track n) {
            <option [value]="n" [selected]="gameState.slickSpeed === n">{{ n }}</option>
          }
        </select>
      </div>
      <div class="loft-control">
        <label class="loft-label">Loft</label>
        <div class="loft-row">
          <span class="loft-tag">Low</span>
          <input type="range" class="loft-slider"
                 min="0" max="1" step="0.01"
                 [value]="gameState.loftT"
                 (input)="setLoft($event)">
          <span class="loft-tag">High</span>
        </div>
      </div>
    </div>
  }
</div>
